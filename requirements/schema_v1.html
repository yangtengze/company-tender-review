
<style>
#erd { overflow-x: auto; padding-bottom: 8px; }
#erd svg { max-width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"><p style="color:var(--color-text-secondary);font-size:13px;padding:12px 0">正在加载关系图…</p></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor:           dark ? '#9c9a92' : '#73726c',
    textColor:           dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor:        dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor:    dark ? '#CECBF6' : '#26215C',
    primaryBorderColor:  dark ? '#534AB7' : '#AFA9EC',
    secondaryColor:      dark ? '#085041' : '#E1F5EE',
    secondaryTextColor:  dark ? '#9FE1CB' : '#0F6E56',
    secondaryBorderColor:dark ? '#1D9E75' : '#5DCAA5',
    tertiaryColor:       dark ? '#3C3489' : '#EEEDFE',
    tertiaryTextColor:   dark ? '#CECBF6' : '#26215C',
    tertiaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
  },
});

const def = `erDiagram
  sys_org {
    bigint id PK
    varchar name
    tinyint type
    bigint parent_id FK
    tinyint status
  }
  sys_user {
    bigint id PK
    varchar username
    varchar real_name
    bigint org_id FK
    tinyint role
    tinyint status
  }
  project {
    bigint id PK
    varchar project_no
    varchar project_name
    bigint build_org_id FK
    bigint contractor_id FK
    bigint supervisor_id FK
    bigint creator_id FK
    tinyint status
  }
  document {
    bigint id PK
    bigint project_id FK
    tinyint doc_type
    varchar doc_name
    tinyint parse_status
    bigint uploader_id FK
  }
  doc_bid_announcement {
    bigint id PK
    bigint doc_id FK
    bigint project_id FK
    datetime publish_date
    datetime deadline_date
    int public_notice_days
  }
  doc_contract {
    bigint id PK
    bigint doc_id FK
    bigint project_id FK
    varchar contract_no
    decimal contract_amount
  }
  doc_extract_cache {
    bigint id PK
    bigint doc_id FK
    varchar extract_type
    json result_json
  }
  change_request {
    bigint id PK
    bigint project_id FK
    varchar change_no
    tinyint change_type
    decimal change_amount
    decimal change_ratio
    bigint apply_org_id FK
    bigint creator_id FK
    tinyint status
  }
  change_request_doc {
    bigint id PK
    bigint change_request_id FK
    bigint doc_id FK
    tinyint doc_role
  }
  review_task {
    bigint id PK
    varchar task_no
    bigint project_id FK
    tinyint task_type
    bigint change_id FK
    bigint assignee_id FK
    bigint creator_id FK
    tinyint status
    tinyint priority
  }
  review_task_doc {
    bigint id PK
    bigint task_id FK
    bigint doc_id FK
    varchar doc_role
  }
  review_result {
    bigint id PK
    bigint task_id FK
    bigint project_id FK
    tinyint overall_verdict
    tinyint risk_level
    int issue_count
    bigint reviewer_id FK
    tinyint review_status
  }
  review_item_result {
    bigint id PK
    bigint result_id FK
    bigint task_id FK
    tinyint check_dimension
    varchar dimension_name
    tinyint verdict
    decimal confidence
  }
  review_issue {
    bigint id PK
    bigint item_result_id FK
    bigint result_id FK
    bigint project_id FK
    tinyint issue_type
    tinyint severity
    tinyint status
    bigint handled_by FK
  }
  llm_call_log {
    bigint id PK
    bigint task_id FK
    varchar model_name
    int total_tokens
    int latency_ms
    tinyint status
  }
  law_regulation {
    bigint id PK
    varchar title
    varchar law_no
    tinyint category
    date effective_date
    tinyint status
  }
  law_clause {
    bigint id PK
    bigint law_id FK
    varchar clause_no
    text content
  }
  case_library {
    bigint id PK
    varchar title
    tinyint case_type
    tinyint issue_type
    json ref_law_ids
  }
  market_price {
    bigint id PK
    varchar item_code
    varchar item_name
    decimal price
    date price_date
    varchar region
  }
  public_platform {
    bigint id PK
    varchar name
    varchar url
    tinyint level
    tinyint is_approved
  }
  sys_operation_log {
    bigint id PK
    bigint user_id FK
    varchar module
    varchar action
    varchar object_type
    bigint object_id
  }
  sys_notification {
    bigint id PK
    bigint user_id FK
    tinyint type
    varchar title
    tinyint is_read
  }

  sys_org    ||--o{ sys_org             : "parent"
  sys_org    ||--o{ sys_user            : "belongs to"
  sys_org    ||--o{ project             : "org roles"
  sys_org    ||--o{ change_request      : "apply org"
  sys_user   ||--o{ project             : "creates"
  sys_user   ||--o{ document            : "uploads"
  sys_user   ||--o{ review_task         : "assigned"
  sys_user   ||--o{ review_result       : "reviews"
  sys_user   ||--o{ review_issue        : "handles"
  sys_user   ||--o{ change_request      : "creates"
  sys_user   ||--o{ sys_operation_log   : "logs"
  sys_user   ||--o{ sys_notification    : "receives"
  project    ||--o{ document            : "has"
  project    ||--o{ change_request      : "has"
  project    ||--o{ review_task         : "has"
  project    ||--o{ review_result       : "has"
  document   ||--o| doc_bid_announcement: "extends"
  document   ||--o| doc_contract        : "extends"
  document   ||--o| doc_extract_cache   : "cached"
  document   ||--o{ change_request_doc  : "linked"
  document   ||--o{ review_task_doc     : "used"
  change_request ||--o{ change_request_doc : "files"
  change_request ||--o{ review_task        : "triggers"
  review_task    ||--o{ review_task_doc    : "uses"
  review_task    ||--o| review_result      : "produces"
  review_task    ||--o{ llm_call_log       : "calls"
  review_result  ||--o{ review_item_result : "contains"
  review_item_result ||--o{ review_issue   : "raises"
  law_regulation ||--o{ law_clause         : "contains"
`;

try {
  const { svg } = await mermaid.render('erd-main', def);
  document.getElementById('erd').innerHTML = svg;

  document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
    const fp = node.querySelector('path[d]');
    if (!fp) return;
    const nums = fp.getAttribute('d').match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0],nums[2],nums[4],nums[6]], ys = [nums[1],nums[3],nums[5],nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs)-x,  h = Math.max(...ys)-y;
    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',x); r.setAttribute('y',y);
    r.setAttribute('width',w); r.setAttribute('height',h); r.setAttribute('rx','8');
    for (const a of ['fill','stroke','stroke-width','class','style'])
      if (fp.hasAttribute(a)) r.setAttribute(a, fp.getAttribute(a));
    fp.replaceWith(r);
  });

  document.querySelectorAll(
    '#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path'
  ).forEach(p => p.setAttribute('stroke','none'));

} catch(e) {
  document.getElementById('erd').innerHTML =
    `<p style="color:var(--color-text-danger);font-size:13px;padding:8px">渲染失败: ${e.message}</p>`;
}
</script>
